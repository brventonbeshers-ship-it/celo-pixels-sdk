name: Automated Checks

on:
  schedule:
    - cron: '*/7 * * * *'
  workflow_dispatch:

jobs:
  automated-checks:
    name: Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Create isolated environment
        run: |
          mkdir checks-${{ matrix.node-version }} && cd checks-${{ matrix.node-version }}
          npm init -y

      - name: Add celo-pixels-sdk dependency
        working-directory: checks-${{ matrix.node-version }}
        run: npm install celo-pixels-sdk
        continue-on-error: true

      - name: Validate require works
        working-directory: checks-${{ matrix.node-version }}
        run: |
          node -e "
            const sdk = require('celo-pixels-sdk');
            console.log('Node ${{ matrix.node-version }} - require OK');
            console.log('Exports found:', Object.keys(sdk).length);
            Object.entries(sdk).forEach(([k, v]) => console.log('  ', k, '=', typeof v));
          "
        continue-on-error: true

      - name: Security audit
        working-directory: checks-${{ matrix.node-version }}
        run: npm audit --omit=dev
        continue-on-error: true

      - name: Fetch latest version from registry
        run: npm view celo-pixels-sdk version
        continue-on-error: true

      - name: Confirm package integrity
        working-directory: checks-${{ matrix.node-version }}
        run: npm pack celo-pixels-sdk --dry-run 2>/dev/null || npm ls celo-pixels-sdk
        continue-on-error: true
